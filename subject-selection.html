<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Select Subjects | Mr. Timi Scholar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .orb-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
        .orb { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(0, 240, 255, 0.3), rgba(0, 0, 20, 0.1)); filter: blur(40px); animation: float 20s infinite ease-in-out; }
        .orb1 { width: 400px; height: 400px; top: -100px; left: -100px; background: radial-gradient(circle, #00f0ff, #001); animation: pulse 8s infinite ease-in-out; }
        .orb2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: radial-gradient(circle, #ff00f0, #10001a); animation: pulse 12s infinite ease-in-out reverse; }
        .orb3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, #ff5722, #331100); animation: pulse 10s infinite ease-in-out; opacity: 0.3; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.5; } }
        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 33% { transform: translateY(-30px) translateX(20px); } 66% { transform: translateY(20px) translateX(-20px); } }
        .subject-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 550px;
            width: 100%;
            margin: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        .logo h1 {
            background: linear-gradient(135deg, #311b92 0%, #ff5722 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }
        .logo p { text-align: center; color: #666; font-size: 14px; margin-bottom: 24px; }
        h2 { color: #311b92; margin-bottom: 16px; font-size: 22px; text-align: center; }
        .subjects-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }
        .subject-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }
        .subject-item.disabled {
            opacity: 0.7;
            cursor: default;
            background: #f0f0f0;
        }
        .subject-item input {
            width: 20px;
            height: 20px;
            accent-color: #ff5722;
            cursor: pointer;
        }
        .subject-item.disabled input {
            cursor: default;
        }
        .subject-name {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }
        .compulsory-badge {
            margin-left: auto;
            font-size: 12px;
            background: #ff5722;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #311b92 0%, #4527a0 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(49,27,146,0.3); }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        @media (max-width: 480px) {
            .subject-card { padding: 28px 20px; }
            .subject-item { padding: 10px 16px; }
        }
    </style>
</head>
<body>
    <div class="orb-container">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>
    <div class="subject-card">
        <div class="logo">
            <h1>Mr. Timi <span>Scholar</span></h1>
            <p>Select your subjects</p>
        </div>
        <h2>Your Department: <span id="deptName"></span></h2>
        <div id="subjectsContainer" class="subjects-list"></div>
        <button class="btn" id="saveSubjectsBtn">Save & Continue</button>
        <div id="errorMsg" class="error-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { ... }; // your config
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Subjects per department (English is always included)
        const subjectsByDept = {
            science: [
                { name: "English", id: "english", compulsory: true },
                { name: "Mathematics", id: "mathematics", compulsory: false },
                { name: "Physics", id: "physics", compulsory: false },
                { name: "Chemistry", id: "chemistry", compulsory: false },
                { name: "Biology", id: "biology", compulsory: false }
            ],
            arts: [
                { name: "English", id: "english", compulsory: true },
                { name: "Literature", id: "literature", compulsory: false },
                { name: "Christian Religious Studies", id: "crs", compulsory: false },
                { name: "Government", id: "government", compulsory: false },
                { name: "Economics", id: "economics", compulsory: false }
            ],
            commercial: [
                { name: "English", id: "english", compulsory: true },
                { name: "Mathematics", id: "mathematics", compulsory: false },
                { name: "Economics", id: "economics", compulsory: false },
                { name: "Accounting", id: "accounting", compulsory: false },
                { name: "Commerce", id: "commerce", compulsory: false }
            ]
        };

        let department = null;
        let selectedSubjects = new Set();

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const userRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userRef);
            if (!userDoc.exists()) { window.location.href = "index.html"; return; }
            department = userDoc.data().department;
            if (!department) { window.location.href = "department.html"; return; }
            document.getElementById('deptName').innerText = department.charAt(0).toUpperCase() + department.slice(1);

            // Load previously selected subjects if any
            const storedSubjects = userDoc.data().subjects || [];
            selectedSubjects = new Set(storedSubjects);
            // Ensure English is always selected
            selectedSubjects.add("english");

            renderSubjects();
        });

        function renderSubjects() {
            const container = document.getElementById('subjectsContainer');
            const subjects = subjectsByDept[department];
            if (!subjects) {
                container.innerHTML = '<div class="error-message">Department subjects not found.</div>';
                return;
            }
            container.innerHTML = subjects.map(subj => `
                <div class="subject-item ${subj.compulsory ? 'disabled' : ''}" data-id="${subj.id}">
                    <input type="checkbox" ${subj.compulsory ? 'checked disabled' : (selectedSubjects.has(subj.id) ? 'checked' : '')} ${subj.compulsory ? 'disabled' : ''}>
                    <span class="subject-name">${subj.name}</span>
                    ${subj.compulsory ? '<span class="compulsory-badge">Compulsory</span>' : ''}
                </div>
            `).join('');

            // Add event listeners to checkboxes (non-compulsory)
            document.querySelectorAll('.subject-item:not(.disabled)').forEach(item => {
                const checkbox = item.querySelector('input');
                const subjectId = item.getAttribute('data-id');
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedSubjects.add(subjectId);
                    } else {
                        selectedSubjects.delete(subjectId);
                    }
                });
            });
        }

        document.getElementById('saveSubjectsBtn').addEventListener('click', async () => {
            if (selectedSubjects.size === 0) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerText = 'You must select at least one subject. English is already selected.';
                return;
            }
            const user = auth.currentUser;
            if (!user) return;
            const userRef = doc(db, "users", user.uid);
            await updateDoc(userRef, { subjects: Array.from(selectedSubjects) });
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
