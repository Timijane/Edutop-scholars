<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Select Subjects | Mr. Timi Scholar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #1a237e 0%, #311b92 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        .logo h1 { color: #311b92; font-size: 32px; text-align: center; margin-bottom: 8px; }
        .logo span { color: #ff5722; }
        .logo p { text-align: center; color: #888; font-size: 14px; margin-bottom: 24px; }
        h2 { color: #311b92; margin-bottom: 16px; font-size: 22px; text-align: center; }
        .subjects-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
        .subject-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8f9fa;
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #e0e0e0;
        }
        .subject-item.disabled { opacity: 0.7; background: #f0f0f0; cursor: default; }
        .subject-item input { width: 20px; height: 20px; accent-color: #ff5722; cursor: pointer; }
        .subject-item.disabled input { cursor: default; }
        .subject-name { font-size: 16px; font-weight: 500; color: #333; }
        .compulsory-badge { margin-left: auto; font-size: 12px; background: #ff5722; color: white; padding: 4px 10px; border-radius: 30px; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #311b92;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #1a237e; transform: translateY(-2px); }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-top: 20px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><h1>Mr. Timi <span>Scholar</span></h1><p>Select your subjects</p></div>
        <h2>Your Department: <span id="deptName"></span></h2>
        <div id="subjectsContainer" class="subjects-list"></div>
        <button class="btn" id="saveSubjectsBtn">Save & Continue</button>
        <div id="errorMsg" class="error-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCictHNxtslYs9VR0hoicxlwPn_QghkgIA",
            authDomain: "edutop-7ff51.firebaseapp.com",
            projectId: "edutop-7ff51",
            storageBucket: "edutop-7ff51.firebasestorage.app",
            messagingSenderId: "79307850494",
            appId: "1:79307850494:web:b51ce51204140ec5429baf"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const subjectsByDept = {
            science: [
                { name: "English", id: "english", compulsory: true },
                { name: "Mathematics", id: "mathematics", compulsory: false },
                { name: "Physics", id: "physics", compulsory: false },
                { name: "Chemistry", id: "chemistry", compulsory: false },
                { name: "Biology", id: "biology", compulsory: false }
            ],
            arts: [
                { name: "English", id: "english", compulsory: true },
                { name: "Literature", id: "literature", compulsory: false },
                { name: "Christian Religious Studies", id: "crs", compulsory: false },
                { name: "Government", id: "government", compulsory: false },
                { name: "Economics", id: "economics", compulsory: false }
            ],
            commercial: [
                { name: "English", id: "english", compulsory: true },
                { name: "Mathematics", id: "mathematics", compulsory: false },
                { name: "Economics", id: "economics", compulsory: false },
                { name: "Accounting", id: "accounting", compulsory: false },
                { name: "Commerce", id: "commerce", compulsory: false }
            ]
        };

        let department = null;
        let selectedSubjects = new Set();

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const userRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userRef);
            if (!userDoc.exists()) { window.location.href = "index.html"; return; }
            department = userDoc.data().department;
            if (!department) { window.location.href = "department.html"; return; }
            document.getElementById('deptName').innerText = department.charAt(0).toUpperCase() + department.slice(1);
            const storedSubjects = userDoc.data().subjects || [];
            selectedSubjects = new Set(storedSubjects);
            selectedSubjects.add("english"); // ensure English always
            renderSubjects();
        });

        function renderSubjects() {
            const container = document.getElementById('subjectsContainer');
            const subjects = subjectsByDept[department];
            if (!subjects) return;
            container.innerHTML = subjects.map(subj => `
                <div class="subject-item ${subj.compulsory ? 'disabled' : ''}" data-id="${subj.id}">
                    <input type="checkbox" ${subj.compulsory ? 'checked disabled' : (selectedSubjects.has(subj.id) ? 'checked' : '')} ${subj.compulsory ? 'disabled' : ''}>
                    <span class="subject-name">${subj.name}</span>
                    ${subj.compulsory ? '<span class="compulsory-badge">Compulsory</span>' : ''}
                </div>
            `).join('');
            document.querySelectorAll('.subject-item:not(.disabled)').forEach(item => {
                const checkbox = item.querySelector('input');
                const subjectId = item.getAttribute('data-id');
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) selectedSubjects.add(subjectId);
                    else selectedSubjects.delete(subjectId);
                });
            });
        }

        document.getElementById('saveSubjectsBtn').addEventListener('click', async () => {
            if (selectedSubjects.size === 0) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerText = 'You must select at least one subject. English is already selected.';
                return;
            }
            const user = auth.currentUser;
            if (!user) return;
            const userRef = doc(db, "users", user.uid);
            await updateDoc(userRef, { subjects: Array.from(selectedSubjects) });
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
