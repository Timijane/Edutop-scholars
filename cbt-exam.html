<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CBT Exams | Mr. Timi Scholar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #311b92;
            --primary-light: #4527a0;
            --secondary: #ff5722;
            --success: #10b981;
            --light: #f9fafb;
            --dark: #1f2937;
            --gray: #6b7280;
            --border: #e5e7eb;
            --white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
        }

        .header {
            background: var(--white);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 24px;
        }

        .logo span {
            color: var(--secondary);
        }

        .logo a {
            text-decoration: none;
        }

        .nav-btn {
            background: var(--light);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--dark);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--gray);
            font-size: 14px;
        }

        .subject-card {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .subject-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exam-options {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .exam-btn {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .exam-btn.full {
            background: var(--primary);
            color: white;
            border: none;
        }

        .exam-btn.quick {
            background: var(--white);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .exam-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .custom-exam-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary), #ff7849);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .custom-exam-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,87,34,0.3);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .subject-selector {
            margin-bottom: 20px;
        }

        .subject-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .subject-row label {
            font-weight: 500;
        }

        .subject-row input {
            width: 70px;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .modal-btn.cancel {
            background: var(--light);
            color: var(--dark);
        }

        .modal-btn.start {
            background: var(--success);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--gray);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--gray);
            font-size: 11px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
            background: var(--white);
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            .subject-title {
                font-size: 18px;
            }
            .exam-options {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="dashboard.html">
                <h1>Mr. Timi <span>Scholar</span></h1>
            </a>
        </div>
        <a href="dashboard.html" class="nav-btn">
            <i class="fas fa-home"></i> Dashboard
        </a>
    </header>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-laptop"></i> CBT Exams</h1>
            <p>Select a subject to start a standard exam, or build your own custom exam.</p>
        </div>

        <div id="subjectsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading your subjects...</p>
            </div>
        </div>

        <button id="customExamBtn" class="custom-exam-btn">
            <i class="fas fa-plus-circle"></i> Build Custom Exam
        </button>
    </div>

    <!-- Custom Exam Modal -->
    <div id="customModal" class="modal">
        <div class="modal-content">
            <h3>Build Custom Exam</h3>
            <div id="customSubjectsList"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="cancelModalBtn">Cancel</button>
                <button class="modal-btn start" id="startCustomExamBtn">Start Exam</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Mr. Timi Edutop Scholar &copy; 2026 | Powered by Triangle Tech</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCictHNxtslYs9VR0hoicxlwPn_QghkgIA",
            authDomain: "edutop-7ff51.firebaseapp.com",
            projectId: "edutop-7ff51",
            storageBucket: "edutop-7ff51.firebasestorage.app",
            messagingSenderId: "79307850494",
            appId: "1:79307850494:web:b51ce51204140ec5429baf"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Subject display names and icons
        const subjectInfo = {
            english: { name: "English", icon: "fas fa-language", color: "#3b82f6" },
            mathematics: { name: "Mathematics", icon: "fas fa-calculator", color: "#10b981" },
            physics: { name: "Physics", icon: "fas fa-atom", color: "#ef4444" },
            chemistry: { name: "Chemistry", icon: "fas fa-flask", color: "#f59e0b" },
            biology: { name: "Biology", icon: "fas fa-dna", color: "#8b5cf6" },
            literature: { name: "Literature", icon: "fas fa-book", color: "#8b5cf6" },
            crs: { name: "CRS", icon: "fas fa-church", color: "#10b981" },
            government: { name: "Government", icon: "fas fa-landmark", color: "#ef4444" },
            economics: { name: "Economics", icon: "fas fa-chart-line", color: "#f59e0b" },
            accounting: { name: "Accounting", icon: "fas fa-file-invoice-dollar", color: "#ef4444" },
            commerce: { name: "Commerce", icon: "fas fa-shopping-cart", color: "#8b5cf6" }
        };

        let selectedSubjects = [];

        // Load user's selected subjects
        async function loadUserSubjects() {
            const user = auth.currentUser;
            if (!user) return;
            const userRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userRef);
            if (userDoc.exists()) {
                selectedSubjects = userDoc.data().subjects || [];
            }
            renderSubjects();
            renderCustomModalSubjects();
        }

        // Render subject cards with exam options
        function renderSubjects() {
            const container = document.getElementById('subjectsContainer');
            if (!selectedSubjects.length) {
                container.innerHTML = `
                    <div style="text-align:center;padding:40px;background:white;border-radius:24px;">
                        <i class="fas fa-exclamation-circle" style="font-size:48px;color:var(--gray);margin-bottom:16px;"></i>
                        <h3>No Subjects Selected</h3>
                        <p>Please go back to dashboard and select your subjects first.</p>
                        <a href="dashboard.html" class="nav-btn" style="margin-top:20px;">Go to Dashboard</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = selectedSubjects.map(subjId => {
                const info = subjectInfo[subjId] || { name: subjId, icon: "fas fa-book", color: "#6b7280" };
                return `
                    <div class="subject-card">
                        <div class="subject-title">
                            <i class="${info.icon}" style="color: ${info.color};"></i>
                            ${info.name}
                        </div>
                        <div class="exam-options">
                            <button class="exam-btn full" data-subject="${subjId}" data-type="full">
                                <i class="fas fa-clipboard-list"></i> Full Exam (60 Qs, 60 min)
                            </button>
                            <button class="exam-btn quick" data-subject="${subjId}" data-type="quick">
                                <i class="fas fa-bolt"></i> Quick Test (20 Qs, 20 min)
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Attach event listeners to exam buttons
            document.querySelectorAll('.exam-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const subject = btn.getAttribute('data-subject');
                    const type = btn.getAttribute('data-type');
                    let totalQuestions, duration;
                    if (type === 'full') {
                        totalQuestions = 60;
                        duration = 60;
                    } else {
                        totalQuestions = 20;
                        duration = 20;
                    }
                    const examData = {
                        id: `${subject}_${type}`,
                        title: `${subjectInfo[subject]?.name || subject} - ${type === 'full' ? 'Full Exam' : 'Quick Test'}`,
                        duration: duration,
                        totalQuestions: totalQuestions,
                        subject: subject
                    };
                    localStorage.setItem('currentExam', JSON.stringify(examData));
                    window.location.href = 'cbt-taking.html';
                });
            });
        }

        // Build the modal content for custom exam (list subjects with quantity input)
        function renderCustomModalSubjects() {
            const container = document.getElementById('customSubjectsList');
            if (!selectedSubjects.length) {
                container.innerHTML = '<p>No subjects available. Please select subjects first.</p>';
                return;
            }
            container.innerHTML = selectedSubjects.map(subjId => {
                const info = subjectInfo[subjId] || { name: subjId };
                return `
                    <div class="subject-row">
                        <label>${info.name}</label>
                        <input type="number" min="0" max="100" value="10" step="5" data-subject="${subjId}" class="subject-qty">
                    </div>
                `;
            }).join('');
        }

        // Handle custom exam start
        function startCustomExam() {
            const selections = [];
            document.querySelectorAll('.subject-qty').forEach(input => {
                const subject = input.getAttribute('data-subject');
                const qty = parseInt(input.value);
                if (qty > 0) {
                    selections.push({ subject: subject, qty: qty });
                }
            });
            if (selections.length === 0) {
                alert("Please select at least one subject with at least 1 question.");
                return;
            }
            localStorage.setItem('customExamSubjects', JSON.stringify(selections));
            window.location.href = 'cbt-taking.html?custom=true';
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            loadUserSubjects();
        });

        // Modal controls
        const modal = document.getElementById('customModal');
        const customBtn = document.getElementById('customExamBtn');
        const cancelBtn = document.getElementById('cancelModalBtn');
        const startBtn = document.getElementById('startCustomExamBtn');

        customBtn.addEventListener('click', () => {
            renderCustomModalSubjects();
            modal.classList.add('active');
        });

        cancelBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        startBtn.addEventListener('click', startCustomExam);

        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });
    </script>
</body>
</html>
