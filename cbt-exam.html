<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CBT Exam | Mr. Timi Scholar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #311b92;
            --primary-light: #4527a0;
            --secondary: #ff5722;
            --success: #10b981;
            --light: #f9fafb;
            --dark: #1f2937;
            --gray: #6b7280;
            --border: #e5e7eb;
            --white: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
        }

        .header {
            background: var(--white);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 24px;
        }

        .logo span {
            color: var(--secondary);
        }

        .logo a {
            text-decoration: none;
        }

        .nav-btn {
            background: var(--light);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--dark);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--gray);
            font-size: 14px;
        }

        .exam-card {
            background: var(--white);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .exam-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }

        .exam-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .exam-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--gray);
        }

        .exam-description {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--gray);
            font-size: 11px;
            border-top: 1px solid var(--border);
            margin-top: 40px;
            background: var(--white);
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            .exam-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="dashboard.html">
                <h1>Mr. Timi <span>Scholar</span></h1>
            </a>
        </div>
        <a href="dashboard.html" class="nav-btn">
            <i class="fas fa-home"></i> Dashboard
        </a>
    </header>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-laptop"></i> CBT Literature Exams</h1>
            <p>Select an exam category below. Each exam pulls questions from your answered question bank to avoid repetition.</p>
        </div>

        <div id="examsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading exams...</p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Mr. Timi Edutop Scholar &copy; 2026 | Powered by Triangle Tech</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCictHNxtslYs9VR0hoicxlwPn_QghkgIA",
            authDomain: "edutop-7ff51.firebaseapp.com",
            projectId: "edutop-7ff51",
            storageBucket: "edutop-7ff51.firebasestorage.app",
            messagingSenderId: "79307850494",
            appId: "1:79307850494:web:b51ce51204140ec5429baf",
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Define exam categories and their filters
        const exams = [
            {
                id: "general",
                title: "JAMB Literature Mock Exam",
                description: "General literature knowledge, literary devices, unseen poetry, unseen prose, and unseen drama.",
                totalQuestions: 60,
                duration: 60,
                difficulty: "Hard",
                filter: (q) => q.bookId === "general" || q.bookId === "unseen-poetry" || q.bookId === "unseen-prose" || q.bookId === "unseen-drama"
            },
            {
                id: "prose",
                title: "Recommended Prose Exam",
                description: "Questions from all JAMB recommended prose texts (To Kill a Mockingbird, Path of Lucas, So the Path Does Not Die, Redemption Road).",
                totalQuestions: 40,
                duration: 40,
                difficulty: "Medium",
                filter: (q) => ["to-kill-a-mockingbird", "path-of-lucas", "so-the-path-does-not-die", "redemption-road"].includes(q.bookId)
            },
            {
                id: "drama",
                title: "Recommended Drama Exam",
                description: "Questions from all JAMB recommended drama texts (Antony and Cleopatra, Once Upon an Elephant, The Marriage of Anansewa, An Inspector Calls, A Man for All Seasons).",
                totalQuestions: 30,
                duration: 30,
                difficulty: "Medium",
                filter: (q) => ["antony-and-cleopatra", "once-upon-an-elephant", "marriage-of-anansewa", "inspector-calls", "man-for-all-seasons"].includes(q.bookId)
            },
            {
                id: "poetry",
                title: "Recommended Poetry Exam",
                description: "Questions from all JAMB recommended poems (Once Upon a Time, Night, New Tongue, Not My Business, Hearty Garlands, The Breast of the Sea, She Walks in Beauty, The Stone, The Telephone Call, The Nun's Priest's Tale).",
                totalQuestions: 30,
                duration: 30,
                difficulty: "Medium",
                filter: (q) => ["once-upon-a-time", "new-tongue", "night", "not-my-business", "hearty-garlands", "breast-of-the-sea", "she-walks-in-beauty", "the-stone", "telephone-call", "nuns-priest-tale"].includes(q.bookId)
            }
        ];

        async function getAvailableCount(filterFunc) {
            try {
                const snapshot = await getDocs(collection(db, "questions"));
                let count = 0;
                snapshot.forEach(doc => {
                    const q = doc.data();
                    if (filterFunc(q)) count++;
                });
                return count;
            } catch (error) {
                console.error("Error counting questions:", error);
                return 0;
            }
        }

        async function renderExams() {
            const container = document.getElementById('examsContainer');
            const examsWithCounts = await Promise.all(exams.map(async (exam) => {
                const available = await getAvailableCount(exam.filter);
                return { ...exam, available };
            }));
            
            container.innerHTML = examsWithCounts.map(exam => `
                <div class="exam-card">
                    <div class="exam-title">${exam.title}</div>
                    <div class="exam-meta">
                        <span><i class="fas fa-question-circle"></i> ${exam.totalQuestions} Questions</span>
                        <span><i class="fas fa-clock"></i> ${exam.duration} minutes</span>
                        <span><i class="fas fa-chart-line"></i> ${exam.difficulty}</span>
                        <span><i class="fas fa-database"></i> ${exam.available} available</span>
                    </div>
                    <div class="exam-description">${exam.description}</div>
                    <button class="start-btn" data-id="${exam.id}" data-title="${exam.title}" data-duration="${exam.duration}" data-total="${exam.totalQuestions}">
                        <i class="fas fa-play"></i> Start Exam
                    </button>
                </div>
            `).join('');
            
            document.querySelectorAll('.start-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const examData = {
                        id: btn.dataset.id,
                        title: btn.dataset.title,
                        duration: parseInt(btn.dataset.duration),
                        totalQuestions: parseInt(btn.dataset.total),
                        filterType: btn.dataset.id
                    };
                    localStorage.setItem('currentExam', JSON.stringify(examData));
                    window.location.href = 'cbt-taking.html';
                });
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            renderExams();
        });
    </script>
</body>
</html>
