<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Summary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #311b92;
            --primary-light: #4527a0;
            --secondary: #ff5722;
            --light: #f5f5f7;
            --dark: #333;
            --gray: #777;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .preview-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }
        
        .summary-card {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .chapter-title {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--secondary);
        }
        
        .summary-text {
            font-size: 16px;
            line-height: 1.8;
            color: var(--dark);
            margin-bottom: 30px;
            white-space: pre-wrap;
        }
        
        .key-points, .characters {
            background: var(--light);
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
        }
        
        .key-points h3, .characters h3 {
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .key-points ul {
            padding-left: 24px;
            color: var(--gray);
        }
        
        .key-points li {
            margin-bottom: 8px;
        }
        
        .character-tag {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            margin: 5px;
            font-size: 13px;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content"></div>
        <a href="#" onclick="window.close()" class="back-btn"><i class="fas fa-arrow-left"></i> Close Preview</a>
    </div>
    
    <script>
        const previewData = JSON.parse(localStorage.getItem('previewSummary') || '{}');
        
        const bookNames = {
            'to-kill-a-mockingbird': 'To Kill a Mockingbird',
            'path-of-lucas': 'Path of Lucas',
            'so-the-path-does-not-die': 'So the Path Does Not Die',
            'redemption-road': 'Redemption Road'
        };
        
        const bookName = bookNames[previewData.bookId] || 'Unknown Book';
        
        document.getElementById('content').innerHTML = `
            <div class="preview-header">
                <h2>📖 Preview</h2>
                <p>${bookName} - Chapter ${previewData.chapter}</p>
            </div>
            <div class="summary-card">
                <h3 class="chapter-title">Chapter ${previewData.chapter}</h3>
                <div class="summary-text">${previewData.summary.replace(/\n/g, '<br>') || 'No summary written yet.'}</div>
                
                <div class="key-points">
                    <h3><i class="fas fa-lightbulb"></i> Key Points</h3>
                    <ul>
                        ${(previewData.keyPoints || []).map(p => `<li>${p}</li>`).join('') || '<li>No key points added</li>'}
                    </ul>
                </div>
                
                <div class="characters">
                    <h3><i class="fas fa-users"></i> Characters</h3>
                    <div>
                        ${(previewData.characters || []).map(c => `<span class="character-tag">${c}</span>`).join('') || 'No characters listed'}
                    </div>
                </div>
            </div>
        `;
    </script>
</body>
</html>
