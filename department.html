<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Select Department | Mr. Timi Scholar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a237e 0%, #311b92 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            color: #311b92;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .logo span {
            color: #ff5722;
        }

        .logo p {
            color: #777;
            font-size: 14px;
        }

        h2 {
            color: #311b92;
            text-align: center;
            margin-bottom: 28px;
            font-size: 24px;
        }

        .dept-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .dept-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .dept-btn.science {
            background: linear-gradient(135deg, #2196f3, #0b5e9e);
        }

        .dept-btn.arts {
            background: linear-gradient(135deg, #9c27b0, #6a1b9a);
        }

        .dept-btn.commercial {
            background: linear-gradient(135deg, #ff9800, #c66900);
        }

        .dept-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .dept-btn:active {
            transform: translateY(0);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .note {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }
            .dept-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Mr. Timi <span>Scholar</span></h1>
            <p>Your personalised learning path</p>
        </div>
        <h2>Select Your Department</h2>
        <div class="dept-buttons">
            <button class="dept-btn science" data-dept="science">
                <i class="fas fa-flask"></i> Science
            </button>
            <button class="dept-btn arts" data-dept="arts">
                <i class="fas fa-palette"></i> Arts
            </button>
            <button class="dept-btn commercial" data-dept="commercial">
                <i class="fas fa-chart-line"></i> Commercial
            </button>
        </div>
        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>
        <div class="note">
            <i class="fas fa-info-circle"></i> You can change this later from your profile.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCictHNxtslYs9VR0hoicxlwPn_QghkgIA",
            authDomain: "edutop-7ff51.firebaseapp.com",
            projectId: "edutop-7ff51",
            storageBucket: "edutop-7ff51.firebasestorage.app",
            messagingSenderId: "79307850494",
            appId: "1:79307850494:web:b51ce51204140ec5429baf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Helper to show error
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }

        // Check if user is already logged in and has a department
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Not logged in, redirect to login
                window.location.href = "index.html";
                return;
            }

            try {
                const userRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userRef);
                if (userDoc.exists() && userDoc.data().department) {
                    // Already has a department, go directly to subject selection
                    window.location.href = "subject-selection.html";
                    return;
                }
            } catch (err) {
                console.error("Error checking user department:", err);
                // Still allow department selection even if read fails
            }
        });

        // Handle department selection
        const buttons = document.querySelectorAll('.dept-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const department = btn.getAttribute('data-dept');
                const user = auth.currentUser;

                if (!user) {
                    showError("You need to be logged in. Redirecting...");
                    setTimeout(() => window.location.href = "index.html", 2000);
                    return;
                }

                // Disable button and show loading
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="loading-spinner"></span> Saving...';
                btn.disabled = true;

                try {
                    const userRef = doc(db, "users", user.uid);
                    await updateDoc(userRef, { department: department });
                    // Success, go to subject selection
                    window.location.href = "subject-selection.html";
                } catch (error) {
                    console.error("Error saving department:", error);
                    showError("Failed to save department. Please try again.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
