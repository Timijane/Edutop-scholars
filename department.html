<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Select Department | Mr. Timi Scholar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #1a237e 0%, #311b92 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        .logo h1 { color: #311b92; font-size: 32px; margin-bottom: 8px; }
        .logo span { color: #ff5722; }
        .logo p { color: #888; font-size: 14px; margin-bottom: 24px; }
        h2 { color: #311b92; margin-bottom: 24px; font-size: 24px; }
        .dept-buttons { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        .dept-btn {
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
        }
        .dept-btn.science { background: #2196f3; }
        .dept-btn.arts { background: #9c27b0; }
        .dept-btn.commercial { background: #ff9800; }
        .dept-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .note { font-size: 12px; color: #999; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><h1>Mr. Timi <span>Scholar</span></h1><p>Choose your department to continue</p></div>
        <h2>Select Your Department</h2>
        <div class="dept-buttons">
            <button class="dept-btn science" data-dept="science"><i class="fas fa-flask"></i> Science</button>
            <button class="dept-btn arts" data-dept="arts"><i class="fas fa-palette"></i> Arts</button>
            <button class="dept-btn commercial" data-dept="commercial"><i class="fas fa-chart-line"></i> Commercial</button>
        </div>
        <div class="note"><i class="fas fa-info-circle"></i> You can change this later in your profile.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCictHNxtslYs9VR0hoicxlwPn_QghkgIA",
            authDomain: "edutop-7ff51.firebaseapp.com",
            projectId: "edutop-7ff51",
            storageBucket: "edutop-7ff51.firebasestorage.app",
            messagingSenderId: "79307850494",
            appId: "1:79307850494:web:b51ce51204140ec5429baf"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const userRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userRef);
            if (userDoc.exists() && userDoc.data().department) {
                window.location.href = "subject-selection.html";
                return;
            }
        });

        document.querySelectorAll('.dept-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const department = btn.getAttribute('data-dept');
                const user = auth.currentUser;
                if (!user) return;
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, { department: department });
                window.location.href = "subject-selection.html";
            });
        });
    </script>
</body>
</html>
