<!DOCTYPE html>

    <style>
        /* Keep all existing styles - same as before */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        .orb-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.3), rgba(0, 0, 20, 0.1));
            filter: blur(40px);
            animation: float 20s infinite ease-in-out;
        }

        .orb1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, #00f0ff, #001);
            animation: pulse 8s infinite ease-in-out;
        }

        .orb2 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -150px;
            background: radial-gradient(circle, #ff00f0, #10001a);
            animation: pulse 12s infinite ease-in-out reverse;
        }

        .orb3 {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #ff5722, #331100);
            animation: pulse 10s infinite ease-in-out;
            opacity: 0.3;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            33% { transform: translateY(-30px) translateX(20px); }
            66% { transform: translateY(20px) translateX(-20px); }
        }

        .pin-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 500px;
            width: 90%;
            margin: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            background: linear-gradient(135deg, #311b92 0%, #ff5722 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            font-weight: 800;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .welcome {
            text-align: center;
            margin-bottom: 32px;
        }

        .welcome h2 {
            color: #311b92;
            font-size: 28px;
            margin-bottom: 12px;
        }

        .welcome p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        .pin-input-container {
            margin-bottom: 24px;
        }

        .pin-input-container label {
            display: block;
            font-weight: 600;
            color: #311b92;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .pin-input-field {
            width: 100%;
            padding: 16px 20px;
            font-size: 18px;
            font-family: monospace;
            font-weight: 500;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            background: white;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .pin-input-field:focus {
            border-color: #ff5722;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 87, 34, 0.2);
        }

        .pin-hint {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .verify-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #311b92 0%, #4527a0 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(49, 27, 146, 0.3);
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .whatsapp-section {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .whatsapp-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .success-check {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .success-check.show {
            display: block;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(0); }
            50% { transform: scale(1.2); }
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-note {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .pin-card {
                padding: 28px 20px;
            }
            .welcome h2 {
                font-size: 24px;
            }
            .pin-input-field {
                padding: 14px 16px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="orb-container">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <div class="pin-card">
        <div class="logo">
            <h1>Mr. Timi <span>Scholar</span></h1>
            <p>Your Literature Learning Companion</p>
        </div>

        <div class="welcome">
            <h2>Welcome! 🎓</h2>
            <p>Enter your PIN to activate your account</p>
            <p style="font-size: 13px; margin-top: 8px; color: #888;">⚠️ Each PIN can only be used once</p>
        </div>

        <div class="success-check" id="successCheck">
            <i class="fas fa-check-circle" style="font-size: 48px; color: #10b981;"></i>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Invalid PIN or already used.</span>
        </div>

        <div class="pin-input-container">
            <label><i class="fas fa-key"></i> Enter Your PIN</label>
            <input type="text" id="pinInput" class="pin-input-field" 
                   placeholder="Enter your PIN (e.g., scholartimi001)" 
                   autocomplete="off" autofocus>
            <div class="pin-hint">
                <i class="fas fa-info-circle"></i> 
                Enter the PIN you received from the admin
            </div>
        </div>

        <button class="verify-btn" id="verifyBtn">
            <i class="fas fa-unlock-alt"></i> Activate Account
        </button>

        <div class="whatsapp-section">
            <p><i class="fas fa-question-circle"></i> Don't have a PIN?</p>
            <a href="https://wa.me/2349056658964?text=Hello%20Mr.%20Timi%2C%20I%20need%20a%20PIN%20to%20access%20the%20literature%20platform" 
               class="whatsapp-btn" target="_blank">
                <i class="fab fa-whatsapp"></i> Message Admin on WhatsApp
            </a>
        </div>

        <div class="admin-note">
            <i class="fas fa-shield-alt"></i> PIN is required once per account
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCictHNxtslYs9VR0hoicxlwPn_QghkgIA",
            authDomain: "edutop-7ff51.firebaseapp.com",
            projectId: "edutop-7ff51",
            storageBucket: "edutop-7ff51.firebasestorage.app",
            messagingSenderId: "79307850494",
            appId: "1:79307850494:web:b51ce51204140ec5429baf",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const adminEmails = [
            "okewunmitimileyin23@gmail.com",
            "triangleofscholars@gmail.com"
        ];

        // All valid PINs
        const validPins = [
            "scholartimi001", "scholartimi247", "scholartimi360", "scholartimi101", 
            "scholartimi999", "scholartimi007", "scholartimi2026", "scholartimi_pro", 
            "scholartimi_official", "scholartimi_global", "scholartimiX", "scholartimi_dev", 
            "scholartimi_ai", "scholartimiTech", "scholartimiHub", "scholartimiNet", 
            "scholartimiCode", "scholartimiX01", "scholartimiCyber", "scholartimiDigital", 
            "scholartimi526w56", "scholartimi84x92", "scholartimi33z71", "scholartimi91w23", 
            "scholartimi72q18", "scholartimi55t66", "scholartimi12k89", "scholartimi77v34", 
            "scholartimi48y20", "scholartimi63p11", "scholartimi.vibes", "scholartimi.aura", 
            "scholartimi.dream", "scholartimi.space", "scholartimi.flow", "scholartimi.zone", 
            "scholartimi.verse", "scholartimi.glow", "scholartimi.edge", "scholartimi.core", 
            "scholartimiHQ", "scholartimiMedia", "scholartimiStudio", "scholartimiTV", 
            "scholartimiLive", "scholartimiWorld", "scholartimiEmpire", "scholartimiPrime", 
            "scholartimiElite", "scholartimiBrand", "scholartimiX99", "scholartimi_neo", 
            "scholartimi_alpha", "scholartimi_beta", "scholartimi_zen", "scholartimi_max", 
            "scholartimi_plus", "scholartimi_one", "scholartimi_two", "scholartimi_next", 
            "scholartimi8x8", "scholartimi9z9", "scholartimi6w6", "scholartimi4q4", 
            "scholartimi3x7", "scholartimi2k5", "scholartimi1v9", "scholartimi0p0", 
            "scholartimi11x22", "scholartimi22y33", "scholartimi_zx91", "scholartimi_qt56", 
            "scholartimi_mx88", "scholartimi_lp42", "scholartimi_rt77", "scholartimi_vk90", 
            "scholartimi_bn11", "scholartimi_df23", "scholartimi_gh78", "scholartimi_xy66"
        ];

        let currentUser = null;

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        // Check if user already verified
        async function checkUserVerified(userId) {
            const userRef = doc(db, "users", userId);
            const userDoc = await getDoc(userRef);
            return userDoc.exists() && userDoc.data().pinVerified === true;
        }

        // Mark PIN as used in a separate collection (one-time use)
        async function markPinAsUsed(pin) {
            const pinRef = doc(db, "usedPins", pin);
            const pinDoc = await getDoc(pinRef);
            if (pinDoc.exists()) {
                return false; // PIN already used
            }
            await setDoc(pinRef, {
                pin: pin,
                usedAt: new Date().toISOString(),
                usedBy: currentUser.uid
            });
            return true;
        }

        // Verify PIN using transaction to ensure one-time use
        async function verifyAndActivate(pin) {
            const pinLower = pin.toLowerCase().trim();
            
            if (!validPinsLower.includes(pinLower)) {
                showError('Invalid PIN. Please check and try again.');
                return false;
            }
            
            try {
                // Use transaction to ensure one-time use
                const pinRef = doc(db, "usedPins", pinLower);
                const pinDoc = await getDoc(pinRef);
                
                if (pinDoc.exists()) {
                    showError('This PIN has already been used. Please contact admin for a new one.');
                    return false;
                }
                
                // Mark PIN as used
                await setDoc(pinRef, {
                    pin: pinLower,
                    usedAt: new Date().toISOString(),
                    usedBy: currentUser.uid
                });
                
                // Update user as verified
                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, {
                    pinVerified: true,
                    pinUsed: pinLower,
                    verifiedAt: new Date().toISOString()
                });
                
                return true;
                
            } catch (error) {
                console.error("Error verifying PIN:", error);
                showError('Error verifying PIN. Please try again.');
                return false;
            }
        }

        async function handleVerification() {
            const pin = document.getElementById('pinInput').value.trim();
            
            if (!pin) {
                showError('Please enter your PIN');
                return;
            }
            
            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loading-spinner"></span> Verifying...';
            
            const success = await verifyAndActivate(pin);
            
            if (success) {
                const successCheck = document.getElementById('successCheck');
                successCheck.classList.add('show');
                verifyBtn.innerHTML = '<span class="loading-spinner"></span> Activating...';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = '<i class="fas fa-unlock-alt"></i> Activate Account';
                document.getElementById('pinInput').value = '';
                document.getElementById('pinInput').focus();
            }
        }

        document.getElementById('verifyBtn').addEventListener('click', handleVerification);
        document.getElementById('pinInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleVerification();
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            
            currentUser = user;
            
            if (adminEmails.includes(user.email)) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            const isVerified = await checkUserVerified(user.uid);
            if (isVerified) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            document.querySelector('.pin-card').style.display = 'block';
        });
    </script>
</body>
</html>
